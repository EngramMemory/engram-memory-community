version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: engram-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - engram-network
    environment:
      - QDRANT__SERVICE__HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  fastembed:
    image: ollama/ollama:latest
    container_name: engram-fastembed
    ports:
      - "11435:11434"
    volumes:
      - fastembed_data:/root/.ollama
    networks:
      - engram-network
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_storage:
    driver: local
  fastembed_data:
    driver: local

networks:
  engram-network:
    driver: bridge